<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Make Your Poster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
        }

        .hero p {
            font-size: 1.2rem;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .btn-custom {
            background: white;
            color: #2575fc;
            border-radius: 30px;
            padding: 10px 25px;
            font-weight: 500;
        }

        .btn-custom:hover {
            background: #f1f1f1;
        }

        .upload-box {
            background: rgba(255,255,255,0.15);
            border: 2px dashed white;
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
            cursor: pointer;
        }

        .upload-box:hover {
            background: rgba(255,255,255,0.25);
        }

        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>Make Your Poster</h1>
        <p>Create beautiful posters in seconds ✨</p>

        <!-- Upload Box -->
        <label class="upload-box">
            <input type="file" hidden />
            <h5>📁 Click to Upload Image</h5>
        </label>

        <!-- CTA Button -->
        <button class="btn btn-custom mt-4">
            Start Designing 🚀
        </button>
    </div>

    <!-- Footer -->
    <footer>
        © 2026 All Rights Reserved by <strong>GMInvitation</strong>
    </footer>

</body>
</html>
