<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Make Your Poster</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=ABeeZee&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue: #3b82f6;
            --blue-dark: #1d4ed8;
            --slate: #334155;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --white: #ffffff;
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        html, body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--gray-50);
            color: #475569;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Top blue bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: var(--blue);
            z-index: -1;
        }

        /* ── Sidebar ── */
        .sidebar {
            position: fixed;
            top: 0; bottom: 0; left: 0;
            width: 16rem;
            background: var(--white);
            border-radius: 1rem;
            margin: 1rem 0 1rem 1.5rem;
            box-shadow: var(--shadow-xl);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }
        .sidebar-inner {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            scrollbar-width: none;
        }
        .sidebar-inner::-webkit-scrollbar { display: none; }

        .sidebar-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #1e293b;
            line-height: 1.4;
        }

        .field-label {
            display: block;
            font-weight: 600;
            margin-bottom: .5rem;
            font-size: .875rem;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .field-input {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: .5rem;
            padding: .75rem;
            font-size: .875rem;
            color: #334155;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: border-color .2s;
        }
        .field-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }

        .field-group { margin-bottom: 1rem; }

        /* Photo choose button */
        .choose-file-btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            background: #eff6ff;
            color: var(--blue);
            font-size: .8rem;
            font-weight: 600;
            padding: .5rem 1rem;
            border-radius: 9999px;
            cursor: pointer;
            border: none;
            transition: background .2s;
        }
        .choose-file-btn:hover { background: #dbeafe; }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid #f1f5f9;
        }

        .download-btn {
            width: 100%;
            padding: .6rem;
            background: var(--slate);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: .75rem;
            font-weight: 600;
            border: none;
            border-radius: .5rem;
            cursor: pointer;
            text-transform: capitalize;
            transition: background .2s, transform .1s, box-shadow .2s;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / .15);
            letter-spacing: .03em;
        }
        .download-btn:hover { background: #1e293b; transform: translateY(-1px); box-shadow: 0 6px 12px -2px rgb(0 0 0/.2); }
        .download-btn:active { transform: translateY(0); }

        /* ── Main ── */
        .main {
            margin-left: 18rem;
            min-height: 100vh;
            padding: 0 1.5rem 2rem;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            background: var(--white);
            border-radius: 1rem;
            margin-top: 1.25rem;
            padding: .75rem 1.5rem;
            box-shadow: 0 1px 3px rgb(0 0 0/.08);
        }
        .navbar h6 {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
        }

        /* Canvas card */
        .canvas-card {
            background: var(--white);
            border-radius: 1rem;
            box-shadow: var(--shadow-xl);
            margin-top: 1.25rem;
            padding: 2rem 1rem 1.5rem;
            display: flex;
            justify-content: center;
        }

        #artboard_print {
            position: relative;
            width: fit-content;
            max-width: 100%;
            overflow: hidden;
            line-height: 0;
        }

        #artboard_print img.template-img {
            display: block;
            max-height: 80vh;
            width: auto;
            position: relative;
            z-index: 10;
        }

        #previewImg_0 {
            position: absolute;
            z-index: 5;
            display: none;
            object-fit: cover;
        }

        .text-overlay {
            position: absolute;
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }

        .text-overlay h6 {
            font-family: 'ABeeZee', sans-serif;
            color: #fff;
            font-weight: 500;
            line-height: 1.2;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Footer */
        .page-footer {
            background: var(--blue);
            border-radius: .5rem;
            margin-top: 1rem;
            padding: .5rem 1rem;
            text-align: center;
            color: #fff;
            font-size: .875rem;
        }
        .page-footer a { color: #fff; font-weight: 600; text-decoration: underline; }

        /* ── Mobile panel (shown on small screens) ── */
        .mobile-panel {
            display: none;
            background: var(--white);
            border-radius: 1rem;
            box-shadow: var(--shadow-xl);
            margin-top: 1.25rem;
            padding: 1rem;
        }

        /* ── Crop Modal ── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 1rem;
            padding: 1.5rem;
            width: 340px;
            max-width: 95vw;
            box-shadow: var(--shadow-xl);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .modal-header span { font-weight: 600; font-size: 1rem; color: #1e293b; }
        .modal-close {
            background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #64748b;
        }
        .modal-body { display: flex; justify-content: center; margin-bottom: 1rem; }
        .modal-footer { display: flex; justify-content: flex-end; }
        .btn-crop {
            background: var(--blue); color: #fff; border: none;
            padding: .5rem 1.5rem; border-radius: .5rem; font-size: .875rem;
            font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif;
            transition: background .2s;
        }
        .btn-crop:hover { background: var(--blue-dark); }

        #upload-demo { width: 250px; height: 250px; }

        /* Success toast */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: #22c55e; color: #fff;
            padding: .75rem 1.5rem; border-radius: .75rem;
            font-size: .875rem; font-weight: 500;
            box-shadow: var(--shadow-xl);
            opacity: 0; transform: translateY(1rem);
            transition: opacity .3s, transform .3s;
            pointer-events: none; z-index: 9999;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .mobile-panel { display: block; }
        }
    </style>
</head>
<body>
<div class="top-bar"></div>

<!-- ── Sidebar (desktop) ── -->
<aside class="sidebar">
    <div class="sidebar-inner">
        <p class="sidebar-title">Enter your details</p>

        <div class="field-group">
            <span class="field-label">Name</span>
            <input type="text" id="artboard_input_1" class="field-input" placeholder="Your name…">
        </div>

        <div class="field-group">
            <span class="field-label">Photo</span>
            <button class="choose-file-btn" id="chooseFileBtn">
                <i class="fa-solid fa-image"></i> Choose file
            </button>
        </div>
    </div>
    <div class="sidebar-footer">
        <button class="download-btn" onclick="getInputValue()">
            <i class="fa-solid fa-download" style="margin-right:.35rem"></i> Download
        </button>
    </div>
</aside>

<!-- ── Main content ── -->
<main class="main">
    <!-- Navbar -->
    <nav class="navbar">
        <h6>Make Your Poster</h6>
    </nav>

    <!-- Mobile panel -->
    <div class="mobile-panel">
        <p class="sidebar-title">Enter your details</p>
        <div class="field-group">
            <span class="field-label">Name</span>
            <input type="text" id="artboard_input_mob_1" class="field-input" placeholder="Your name…">
        </div>
        <div class="field-group">
            <span class="field-label">Photo</span>
            <button class="choose-file-btn" id="chooseFileBtnMob">
                <i class="fa-solid fa-image"></i> Choose file
            </button>
        </div>
        <button class="download-btn" onclick="getInputValue()" style="margin-top:.5rem">
            <i class="fa-solid fa-download" style="margin-right:.35rem"></i> Download
        </button>
    </div>

    <!-- Canvas card -->
    <div class="canvas-card">
        <div id="artboard_print">
            <img id="previewImg_0" alt="uploaded photo">
            <img class="template-img" id="templateImg" src="static/CharkhoGreen.png" alt="Poster template" onerror="this.style.background='linear-gradient(135deg,#667eea,#764ba2)';this.style.width='500px';this.style.height='500px';this.removeAttribute('src')">
            <div class="text-overlay" id="p_text_div_1">
                <h6 id="p_text_1">Name</h6>
            </div>
        </div>
    </div>

    <!-- Hidden high-res artboard for download -->
    <div id="artboard_print_hidden" style="position:absolute;left:-9999px;top:-9999px;display:none;width:1106px;">
        <div style="position:relative;width:1106px;height:1106px;overflow:hidden;">
            <img id="previewImgHidden_0" style="position:absolute;z-index:5;display:none;" alt="">
            <img id="templateImgHidden" src="static/CharkhoGreen.png" style="width:1106px;height:1106px;position:relative;z-index:10;" alt="">
            <div id="p_text_div_hidden_1" style="position:absolute;z-index:20;text-align:center;">
                <h6 id="p_text_hidden_1" style="font-family:'ABeeZee',sans-serif;color:#fff;font-weight:500;font-size:55px;white-space:pre-wrap;word-wrap:break-word;line-height:1.2;">Name</h6>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        Powered by <a href="#">Poster Maker</a>
    </footer>
</main>

<!-- Crop Modal -->
<div class="modal-overlay" id="cropModal">
    <div class="modal-box">
        <div class="modal-header">
            <span>Crop Photo</span>
            <button class="modal-close" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <div id="upload-demo"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-crop" id="cropImageBtn">Crop &amp; Apply</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">✓ Image downloaded successfully!</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="image/*" style="display:none">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
(function(){
    /* ── state ── */
    var uploadedImageSrc = null;
    var rawImg = null;
    var $uploadCrop = null;
    var templateLoaded = false;

    /* actual template dimensions (will be measured after img loads) */
    var TEMPLATE_W = 1106;
    var TEMPLATE_H = 1106;

    /* Text placement percentages derived from reference code */
    /* original: xc=52, yc=557, wc=471, hc=97 at 1000×1000 */
    var TEXT_X_PCT  = 52   / 1000;
    var TEXT_Y_PCT  = 557  / 1000;
    var TEXT_W_PCT  = 471  / 1000;
    var TEXT_H_PCT  = 97   / 1000;
    var FONT_PX_PCT = 27   / 1000;

    /* Photo placement percentages */
    /* original: xc=63, yc=224, wc=290, hc=287 at 1000×1000 */
    var IMG_X_PCT = 63  / 1000;
    var IMG_Y_PCT = 224 / 1000;
    var IMG_W_PCT = 290 / 1000;
    var IMG_H_PCT = 287 / 1000;

    /* ── helpers ── */
    function positionOverlay(){
        var $ap = $('#artboard_print');
        var w = $ap.width();
        var h = $ap.height();
        if(!w || !h) return;

        // text overlay
        $('#p_text_div_1').css({
            marginLeft : (TEXT_X_PCT  * w) + 'px',
            marginTop  : (TEXT_Y_PCT  * h) + 'px',
            width      : (TEXT_W_PCT  * w) + 'px',
            height     : (TEXT_H_PCT  * h) + 'px',
            position   : 'absolute',
            top        : 0,
            left       : 0
        });
        $('#p_text_1').css('fontSize', (FONT_PX_PCT * w) + 'px');

        // photo overlay
        if(uploadedImageSrc){
            $('#previewImg_0').css({
                display    : 'block',
                position   : 'absolute',
                top        : 0,
                left       : 0,
                marginLeft : (IMG_X_PCT * w) + 'px',
                marginTop  : (IMG_Y_PCT * h) + 'px',
                width      : (IMG_W_PCT * w) + 'px',
                height     : (IMG_H_PCT * h) + 'px',
                objectFit  : 'cover',
                zIndex     : 5
            });
        }
    }

    function positionHiddenOverlay(){
        var w = TEMPLATE_W;
        var h = TEMPLATE_H;
        $('#p_text_div_hidden_1').css({
            position   : 'absolute',
            top        : 0,
            left       : 0,
            marginLeft : (TEXT_X_PCT  * w) + 'px',
            marginTop  : (TEXT_Y_PCT  * h) + 'px',
            width      : (TEXT_W_PCT  * w) + 'px',
            height     : (TEXT_H_PCT  * h) + 'px'
        });
        $('#p_text_hidden_1').css('fontSize', (FONT_PX_PCT * w) + 'px');

        if(uploadedImageSrc){
            $('#previewImgHidden_0').css({
                display    : 'block',
                position   : 'absolute',
                top        : 0,
                left       : 0,
                marginLeft : (IMG_X_PCT * w) + 'px',
                marginTop  : (IMG_Y_PCT * h) + 'px',
                width      : (IMG_W_PCT * w) + 'px',
                height     : (IMG_H_PCT * h) + 'px',
                objectFit  : 'cover',
                zIndex     : 5
            }).attr('src', uploadedImageSrc);
        }
    }

    function syncText(){
        var isMobile = window.innerWidth <= 1024;
        var v = isMobile
            ? $('#artboard_input_mob_1').val()
            : $('#artboard_input_1').val();
        $('#p_text_1').text(v || 'Name');
        $('#p_text_hidden_1').text(v || 'Name');
    }

    /* ── init croppie ── */
    function initCroppie(){
        if($uploadCrop) return;
        $uploadCrop = $('#upload-demo').croppie({
            viewport     : { width: 200, height: 200, type: 'circle' },
            enforceBoundary: true,
            enableExif   : true
        });
    }

    /* ── on template load ── */
    $('#templateImg').on('load', function(){
        templateLoaded = true;
        /* slight delay to let browser finish layout */
        setTimeout(positionOverlay, 50);
    });
    /* If already cached */
    if($('#templateImg')[0].complete){ templateLoaded = true; setTimeout(positionOverlay, 50); }

    /* ── text input ── */
    $('#artboard_input_1, #artboard_input_mob_1').on('input', function(){
        syncText();
    });

    /* ── file choose buttons ── */
    function openFilePicker(){
        initCroppie();
        $('#fileInput').val('').trigger('click');
    }
    $('#chooseFileBtn, #chooseFileBtnMob').on('click', openFilePicker);

    $('#fileInput').on('change', function(){
        var file = this.files[0];
        if(!file) return;
        var reader = new FileReader();
        reader.onload = function(e){
            rawImg = e.target.result;
            $('#cropModal').addClass('active');
            $uploadCrop.croppie('bind', { url: rawImg });
        };
        reader.readAsDataURL(file);
    });

    /* ── close modal ── */
    $('#modalClose').on('click', function(){
        $('#cropModal').removeClass('active');
    });
    $('#cropModal').on('click', function(e){
        if(e.target === this) $('#cropModal').removeClass('active');
    });

    /* ── crop ── */
    $('#cropImageBtn').on('click', function(){
        $uploadCrop.croppie('result',{
            type:'base64', format:'png',
            size:{ width: Math.round(IMG_W_PCT * TEMPLATE_W), height: Math.round(IMG_H_PCT * TEMPLATE_H) }
        }).then(function(resp){
            uploadedImageSrc = resp;
            $('#previewImg_0').attr('src', resp);
            $('#previewImgHidden_0').attr('src', resp);
            $('#cropModal').removeClass('active');
            positionOverlay();
        });
    });

    /* ── download ── */
    window.getInputValue = function(){
        syncText();
        positionHiddenOverlay();

        var $hidden = $('#artboard_print_hidden');
        $hidden.css('display','block');

        /* use the inner wrapper that has the actual template */
        var el = $hidden.children()[0];
        html2canvas(el, { useCORS: true, allowTaint: true, scale: 1 }).then(function(canvas){
            canvas.toBlob(function(blob){
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.download = 'poster.png';
                a.href = url;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast();
            }, 'image/png');
        });

        $hidden.css('display','none');
    };

    function showToast(){
        var t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(function(){ t.classList.remove('show'); }, 3000);
    }

    /* ── reposition on resize ── */
    $(window).on('resize', positionOverlay);

    /* ── initial position ── */
    $(window).on('load', function(){ positionOverlay(); });
})();
</script>
</body>
</html>
